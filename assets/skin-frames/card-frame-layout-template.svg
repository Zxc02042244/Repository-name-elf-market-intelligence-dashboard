<svg xmlns="http://www.w3.org/2000/svg" width="1041" height="1511" viewBox="0 0 1041 1511">
  <title>ELF card frame layout template</title>
  <desc>Fixed geometry guide for all 1041 by 1511 character card frames.</desc>
  <style>
    text { font-family: Arial, sans-serif; letter-spacing: 0; }
    .label { fill: #ffffff; font-size: 22px; font-weight: 700; }
    .detail { fill: #cbd5e1; font-size: 17px; }
    .measure { fill: #f8fafc; font-size: 15px; }
    .center-line { stroke: #ef4444; stroke-width: 2; stroke-dasharray: 14 10; }
    .outer { fill: #f59e0b; fill-opacity: .14; stroke: #fbbf24; stroke-width: 4; }
    .safe { fill: #22c55e; fill-opacity: .16; stroke: #4ade80; stroke-width: 3; stroke-dasharray: 12 8; }
    .character { fill: #38bdf8; fill-opacity: .08; stroke: #38bdf8; stroke-width: 3; stroke-dasharray: 16 10; }
    .edge { fill: none; stroke: #94a3b8; stroke-width: 3; }
    .anchor { fill: #ef4444; stroke: #ffffff; stroke-width: 2; }
  </style>

  <!-- BASE_BACKGROUND: artwork may replace this fill, but canvas dimensions never change. -->
  <rect width="1041" height="1511" fill="#111827" />
  <rect x="24" y="24" width="993" height="1463" class="edge" />

  <!-- Global center line. -->
  <line x1="520.5" y1="24" x2="520.5" y2="1487" class="center-line" />

  <!-- RANK_PLAQUE fixed outer and text-safe boxes. -->
  <rect x="220" y="78" width="601" height="168" rx="8" class="outer" />
  <rect x="275" y="117" width="491" height="90" rx="4" class="safe" />
  <circle cx="520.5" cy="162" r="8" class="anchor" />
  <text x="520.5" y="145" text-anchor="middle" class="label">RANK PLAQUE</text>
  <text x="520.5" y="185" text-anchor="middle" class="detail">CENTER 520.5, 162</text>
  <text x="220" y="68" class="measure">OUTER X220 Y78 W601 H168</text>
  <text x="275" y="228" class="measure">TEXT SAFE X275 Y117 W491 H90</text>

  <!-- CHARACTER_SAFE: keep strong border ornament outside this area. -->
  <rect x="180" y="280" width="681" height="930" rx="12" class="character" />
  <circle cx="520.5" cy="756" r="10" class="anchor" />
  <line x1="492.5" y1="756" x2="548.5" y2="756" class="center-line" />
  <text x="520.5" y="718" text-anchor="middle" class="label">CHARACTER SAFE AREA</text>
  <text x="520.5" y="748" text-anchor="middle" class="detail">ANCHOR CENTER 520.5, 756</text>
  <text x="180" y="1235" class="measure">SAFE X180 Y280 W681 H930</text>

  <!-- NAME_PLAQUE fixed outer and text-safe boxes. -->
  <rect x="120" y="1264" width="801" height="180" rx="8" class="outer" />
  <rect x="210" y="1310" width="621" height="88" rx="4" class="safe" />
  <circle cx="520.5" cy="1354" r="8" class="anchor" />
  <text x="520.5" y="1338" text-anchor="middle" class="label">NAME PLAQUE</text>
  <text x="520.5" y="1378" text-anchor="middle" class="detail">CENTER 520.5, 1354</text>
  <text x="120" y="1254" class="measure">OUTER X120 Y1264 W801 H180</text>
  <text x="210" y="1422" class="measure">TEXT SAFE X210 Y1310 W621 H88</text>

  <text x="42" y="1474" class="detail">CANVAS 1041 x 1511 | ORIGIN 0,0 TOP LEFT | DO NOT SCALE OR CROP</text>
</svg>
